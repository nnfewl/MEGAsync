name: Build patched MEGAsync

on:
  push:
    branches: [tray-iconname]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-arch:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            git cmake qt5-base qt5-tools qt5-svg qt5-x11extras \
            qt5-declarative qt5-quickcontrols qt5-quickcontrols2 \
            crypto++ curl libsodium libuv libmediainfo libzen \
            icu sqlite openssl zlib

      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule init
          git submodule update --depth=1

      - name: Build MEGAsync
        run: |
          export CXXFLAGS+=' -DNDEBUG'
          cmake -B build -S . \
            -G 'Unix Makefiles' \
            -DCMAKE_BUILD_TYPE:STRING='None' \
            -DCMAKE_MODULE_PATH:PATH="${PWD}/src/MEGASync/mega/cmake/modules/packages" \
            -DCMAKE_SKIP_INSTALL_RPATH:BOOL='YES' \
            -DENABLE_DESIGN_TOKENS_IMPORTER:BOOL='OFF' \
            -DENABLE_DESKTOP_APP_TESTS:BOOL='OFF' \
            -DUSE_BREAKPAD:BOOL='OFF' \
            -DUSE_FFMPEG:BOOL='OFF' \
            -DUSE_FREEIMAGE:BOOL='OFF' \
            -DENABLE_ISOLATED_GFX:BOOL='OFF' \
            -DUSE_PDFIUM:BOOL='OFF' \
            -Wno-dev
          cmake --build build --target MEGAsync

      - name: Package artifact
        run: |
          mkdir -p staging
          cp build/src/MEGASync/megasync staging/megasync_arch
          chmod +x staging/megasync_arch

      - uses: actions/upload-artifact@v4
        with:
          name: megasync_arch
          path: staging/megasync_arch
          if-no-files-found: error
          retention-days: 7

  build-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake wget autoconf-archive \
            curl zip unzip tar pkg-config nasm \
            libxcb-cursor0 qtbase5-dev qttools5-dev \
            libqt5x11extras5-dev libqt5svg5-dev libqt5dbus5 qtdeclarative5-dev \
            qml-module-qtquick-dialogs qml-module-qtquick-controls2

      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule init
          git submodule update --depth=1

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: /tmp/vcpkg/installed
          key: vcpkg-ubuntu-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: vcpkg-ubuntu-

      - name: Build MEGAsync
        run: |
          cmake -DVCPKG_ROOT=/tmp/vcpkg -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_DESIGN_TOKENS_IMPORTER:BOOL='OFF' \
            -DENABLE_DESKTOP_APP_TESTS:BOOL='OFF' \
            -DUSE_BREAKPAD:BOOL='OFF'
          cmake --build build --target MEGAsync

      - name: Package artifact
        run: |
          mkdir -p staging
          cp build/src/MEGASync/megasync staging/megasync_ubuntu
          chmod +x staging/megasync_ubuntu

      - uses: actions/upload-artifact@v4
        with:
          name: megasync_ubuntu
          path: staging/megasync_ubuntu
          if-no-files-found: error
          retention-days: 7
